<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Oliver's Oasis | Contact</title>
        <meta name="description" content="Contact Oliver's Oasis with questions, comments, or adventure ideas.">
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <header>
            <div class="site-logo">
                <img src="ollie-mascot.png" alt="Oliver the corgi as a sheriff" class="logo">
                <h1>Oliver's Oasis</h1>
            </div>

            <nav>
                <ul>
                    <li><a href="index.html" class="button">Home</a></li>
                    <li><a href="adventures.html" class="button">Adventures</a></li>
                    <li><a href="about.html" class="button">About</a></li>
                    <li><a href="merch.html" class="button">Merch</a></li>
                    <li><a href="contact.html" class="button">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="contact-section">
                <h2>Contact Oliver's Oasis</h2>
                <p>Have a question, a fun story, or an adventure idea for Ollie? Send a message below.</p>

                <form class="contact-form" action="#" method="post">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Write your message here" required></textarea>

                    <div class="form-buttons">
                        <button type="submit">Send Message</button>
                        <button type="reset" class="reset-button">Clear Form</button>
                    </div>
                </form>
            </section>
        </main>
    </body>
</html>
